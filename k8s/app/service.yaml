apiVersion: v1
kind: Service
metadata:
  name: app-service
spec:
  type: NodePort
  selector:
    app: app-pd        # должен совпадать с labels в Deployment template
  ports:
  - port: 8000         # порт внутри кластера
    targetPort: 8000   # порт контейнера
    nodePort: 30001    # внешний порт